<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fbfbfd" />
  <title>Supplier Catalog</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </span>
      <div>
        <h1>Supplier Catalog</h1>
        <p class="subtitle">Catalogs, quotes &amp; collateral from every supplier — in one place</p>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <div class="tabs-inner" role="tablist">
      <button class="tab active" data-tab="suppliers" role="tab">Suppliers<span class="count" data-count="suppliers"></span></button>
      <button class="tab" data-tab="competitors" role="tab">Competitors<span class="count" data-count="competitors"></span></button>
      <button class="tab" data-tab="catalog" role="tab">Catalog<span class="count" data-count="catalog"></span></button>
      <button class="tab" data-tab="quotes" role="tab">Quotes<span class="count" data-count="quotes"></span></button>
      <button class="tab" data-tab="documents" role="tab">Documents<span class="count" data-count="documents"></span></button>
      <button class="tab" data-tab="coverage" role="tab">Coverage</button>
    </div>
  </nav>

  <main>
    <!-- Suppliers (Chinese sources) -->
    <section id="suppliers" class="panel active">
      <div class="panel-head">
        <h2>Suppliers</h2>
        <div class="actions">
          <input type="search" class="search" id="supplier-search" placeholder="Search suppliers…" />
          <div class="dropdown">
            <button type="button" class="btn" data-dd-toggle>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M4 20h16"/></svg>
              Import <span class="chev">▾</span></button>
            <div class="dropdown-menu">
              <button type="button" class="dd-item" data-import="catalog" data-srctype="supplier">📄 Catalog file <span class="dd-sub">CSV · Excel · PDF</span></button>
              <button type="button" class="dd-item" data-import="sheet" data-srctype="supplier">📊 Google Sheet</button>
              <button type="button" class="dd-item" data-import="chat" data-srctype="supplier">📨 From Chat</button>
              <button type="button" class="dd-item" data-import="drive" data-srctype="supplier">📁 From Drive</button>
              <button type="button" class="dd-item" data-import="quotation" data-srctype="supplier">💲 Quotation</button>
              <button type="button" class="dd-item" data-import="images" data-srctype="supplier">🖼 Images</button>
            </div>
          </div>
          <button class="btn" data-merge data-srctype="supplier" title="Combine duplicate suppliers into one">🔀 Merge</button>
          <button class="btn primary" data-add-supplier data-srctype="supplier">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Supplier</button>
        </div>
      </div>
      <div id="suppliers-body"></div>
    </section>

    <!-- Competitors (reference brands) -->
    <section id="competitors" class="panel">
      <div class="panel-head">
        <h2>Competitors</h2>
        <div class="actions">
          <input type="search" class="search" id="competitor-search" placeholder="Search competitors…" />
          <button class="btn" id="curate-ai" title="Consolidate product types with AI across all brands">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg>
            Curate categories</button>
          <div class="dropdown">
            <button type="button" class="btn" data-dd-toggle>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M4 20h16"/></svg>
              Import <span class="chev">▾</span></button>
            <div class="dropdown-menu">
              <button type="button" class="dd-item" data-import="catalog" data-srctype="reference">📄 Portfolio file <span class="dd-sub">CSV · Excel · PDF</span></button>
              <button type="button" class="dd-item" data-import="sheet" data-srctype="reference">📊 Google Sheet</button>
              <button type="button" class="dd-item" data-import="chat" data-srctype="reference">📨 From Chat</button>
              <button type="button" class="dd-item" data-import="drive" data-srctype="reference">📁 From Drive</button>
              <button type="button" class="dd-item" data-import="images" data-srctype="reference">🖼 Images</button>
            </div>
          </div>
          <button class="btn" data-merge data-srctype="reference" title="Combine duplicate competitors into one">🔀 Merge</button>
          <button class="btn primary" data-add-supplier data-srctype="reference">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Competitor</button>
        </div>
      </div>
      <div id="competitors-body"></div>
    </section>

    <!-- Catalog -->
    <section id="catalog" class="panel">
      <div class="panel-head">
        <h2>Catalog</h2>
        <div class="actions">
          <div class="seg" id="catalog-view-toggle" role="tablist">
            <button data-view="gallery" class="active" title="Gallery view" aria-label="Gallery view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></button>
            <button data-view="table" title="Table view" aria-label="Table view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          </div>
          <input type="search" id="catalog-search" placeholder="Search name, SKU, description…" />
          <div class="dropdown">
            <button type="button" class="btn" data-dd-toggle>🧰 Tools <span class="chev">▾</span></button>
            <div class="dropdown-menu">
              <button type="button" class="dd-item" id="cleanup-junk">🧹 Remove junk rows <span class="dd-sub">banner / summary lines</span></button>
              <button type="button" class="dd-item" id="dedupe-images">🖼 De-dupe images <span class="dd-sub">duplicate photos</span></button>
            </div>
          </div>
          <button class="btn primary" id="add-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Item</button>
        </div>
      </div>
      <div class="filter-bar">
        <label class="filt"><span>Supplier</span>
          <select id="catalog-supplier-filter"><option value="all">All suppliers</option></select></label>
        <label class="filt"><span>Competitor</span>
          <select id="catalog-competitor-filter"><option value="none">None</option></select></label>
        <label class="filt"><span>Master category</span>
          <select id="catalog-master-filter"><option value="">All master categories</option></select></label>
        <label class="filt"><span>Sub-category</span>
          <select id="catalog-sub-filter"><option value="">All sub-categories</option></select></label>
        <span class="filt-count" id="catalog-count"></span>
      </div>
      <div id="catalog-gallery" class="gallery-grid"></div>
      <div class="table-wrap hidden" id="catalog-table-wrap"><table id="catalog-table">
        <thead><tr>
          <th>Item</th><th>SKU</th><th>Supplier</th><th>Unit</th>
          <th>Category</th><th class="right">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table></div>
    </section>

    <!-- Quotes -->
    <section id="quotes" class="panel">
      <div class="panel-head">
        <h2>Quotes</h2>
        <div class="actions">
          <select id="quote-item-filter"><option value="">All catalog items</option></select>
          <button class="btn primary" id="add-quote">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Quote</button>
        </div>
      </div>
      <div class="table-wrap"><table id="quotes-table">
        <thead><tr>
          <th>Item</th><th>Unit Price</th><th>Min Qty</th><th>Valid From</th>
          <th>Valid Until</th><th class="right">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table></div>
    </section>

    <!-- Documents -->
    <section id="documents" class="panel">
      <div class="panel-head">
        <h2>Documents</h2>
        <div class="actions">
          <button class="btn primary" id="add-document">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload Document</button>
        </div>
      </div>
      <div class="table-wrap"><table id="documents-table">
        <thead><tr>
          <th>File</th><th>Type</th><th>Size</th><th>Supplier</th>
          <th>Item</th><th class="right">Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table></div>
    </section>
    <!-- Coverage -->
    <section id="coverage" class="panel">
      <div class="panel-head">
        <h2>Coverage</h2>
        <div class="actions">
          <select id="coverage-brand"><option value="">All reference brands</option></select>
          <button class="btn" id="classify-ai">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg>
            Classify with AI</button>
        </div>
      </div>
      <div id="coverage-body"></div>
    </section>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head"><h3 id="modal-title">Form</h3>
        <button class="icon-btn" id="modal-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button></div>
      <form id="modal-form"><div id="modal-fields"></div>
        <div class="modal-foot">
          <span id="modal-extra"></span>
          <span class="spacer"></span>
          <button type="button" class="btn" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js"></script>
</body>
</html>
